<!DOCTYPE html>
<html>
<head>
    <title>Debug Dashboard</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #fff; }
        pre { background: #2d2d2d; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .info { color: #2196f3; }
    </style>
</head>
<body>
    <h1>Dashboard API Debug</h1>
    <div id="output"></div>

    <script>
        const output = document.getElementById('output');
        const API_URL = 'http://localhost:8001';
        
        async function debug() {
            try {
                // Log environment
                output.innerHTML += `<p class="info">🔍 Environment</p>`;
                output.innerHTML += `<p>Frontend: ${window.location.origin}</p>`;
                output.innerHTML += `<p>API URL: ${API_URL}</p>`;
                output.innerHTML += `<p>API Endpoint: ${API_URL}/api/dashboard</p>`;
                
                // Step 1: Get token
                output.innerHTML += `<p class="info">1️⃣ Fetching token...</p>`;
                const tokenResp = await fetch(`${API_URL}/token`);
                output.innerHTML += `<p>Token Status: ${tokenResp.status} ${tokenResp.statusText}</p>`;
                
                const tokenData = await tokenResp.json();
                const token = tokenData.access_token;
                output.innerHTML += `<p class="success">✓ Token obtained</p>`;
                
                // Step 2: Fetch dashboard
                output.innerHTML += `<p class="info">2️⃣ Fetching dashboard...</p>`;
                const dashResp = await fetch(`${API_URL}/api/dashboard`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                output.innerHTML += `<p>Dashboard Status: ${dashResp.status} ${dashResp.statusText}</p>`;
                output.innerHTML += `<p>Response Headers:</p>`;
                output.innerHTML += `<pre>`;
                dashResp.headers.forEach((value, key) => {
                    output.innerHTML += `${key}: ${value}\n`;
                });
                output.innerHTML += `</pre>`;
                
                const data = await dashResp.json();
                output.innerHTML += `<p class="success">✓ Dashboard data loaded</p>`;
                output.innerHTML += `<p>Metrics:</p>`;
                output.innerHTML += `<pre>${JSON.stringify({
                    totalQueries: data.totalQueries,
                    successRate: data.successRate,
                    avgLatency: data.avgLatency,
                    queryByRoute: data.queryByRoute,
                    queryByRisk: data.queryByRisk
                }, null, 2)}</pre>`;
                
            } catch (error) {
                output.innerHTML += `<p class="error">✗ Error: ${error.message}</p>`;
                output.innerHTML += `<p class="error">Stack:</p>`;
                output.innerHTML += `<pre>${error.stack}</pre>`;
            }
        }
        
        debug();
    </script>
</body>
</html>
