<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .error { color: red; }
        .success { color: green; }
        pre { background: #f0f0f0; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>API Connectivity Test</h1>
    <div id="output"></div>
    
    <script>
        const output = document.getElementById('output');
        const API_URL = 'http://localhost:8001';
        
        async function test() {
            output.innerHTML = '<p>Testing connectivity...</p>';
            
            try {
                // Test 1: Token
                output.innerHTML += '<h3>1. Testing /token</h3>';
                const tokenResp = await fetch(`${API_URL}/token`);
                output.innerHTML += `<p>Status: <span class="${tokenResp.ok ? 'success' : 'error'}">${tokenResp.status}</span></p>`;
                
                if (!tokenResp.ok) throw new Error('Token fetch failed');
                
                const tokenData = await tokenResp.json();
                const token = tokenData.access_token;
                output.innerHTML += `<p class="success">Token obtained (${token.substring(0, 30)}...)</p>`;
                
                // Test 2: Dashboard without token
                output.innerHTML += '<h3>2. Testing /api/dashboard (no auth)</h3>';
                const dashResp1 = await fetch(`${API_URL}/api/dashboard`);
                output.innerHTML += `<p>Status: <span class="${dashResp1.ok ? 'success' : 'error'}">${dashResp1.status}</span></p>`;
                
                if (dashResp1.ok) {
                    const data = await dashResp1.json();
                    output.innerHTML += `<p class="success">Dashboard data: ${data.totalQueries} queries, ${data.successRate}% success</p>`;
                } else {
                    output.innerHTML += `<p class="error">Failed: ${dashResp1.status}</p>`;
                }
                
                // Test 3: Dashboard with token
                output.innerHTML += '<h3>3. Testing /api/dashboard (with auth)</h3>';
                const dashResp2 = await fetch(`${API_URL}/api/dashboard`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                output.innerHTML += `<p>Status: <span class="${dashResp2.ok ? 'success' : 'error'}">${dashResp2.status}</span></p>`;
                
                if (dashResp2.ok) {
                    const data = await dashResp2.json();
                    output.innerHTML += `<p class="success">Dashboard works! Data: ${JSON.stringify(data).substring(0, 200)}...</p>`;
                }
                
                output.innerHTML += '<h2 class="success">✓ All tests passed!</h2>';
            } catch (error) {
                output.innerHTML += `<p class="error">Error: ${error.message}</p>`;
                console.error(error);
            }
        }
        
        window.addEventListener('load', test);
    </script>
</body>
</html>
